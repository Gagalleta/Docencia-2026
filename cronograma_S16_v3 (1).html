const today = new Date(); today.setHours(0,0,0,0);
function daysDiff(d) { const t=new Date(d); t.setHours(0,0,0,0); return Math.round((t-today)/86400000); }
function daysLabel(d) {
  const diff = daysDiff(d);
  if (diff<0)  return {text:"Realizado", past:true};
  if (diff===0) return {text:"¡Hoy!", past:false};
  if (diff===1) return {text:"Mañana", past:false};
  return {text:"En "+diff+" días", past:false};
}

// SUMMARY BAR
function renderSummary() {
  const nextClase   = rows.find(r=>r.type!=="receso" && daysDiff(r.jsDate)>=0);
  const nextEntrega = rows.find(r=>r.tags&&r.tags.some(t=>t.k==="entrega")&&daysDiff(r.jsDate)>=0);
  const hitos = rows.filter(r=>r.hito);
  let html="";
  if(nextClase){
    const dl=daysLabel(nextClase.jsDate);
    html+=`<div class="sum-box prox-clase">
      <div class="sum-label">Próxima clase</div>
      <div class="sum-main">${nextClase.clase} · ${nextClase.topic}</div>
      <div class="sum-sub">${nextClase.date} · ${nextClase.hora}</div>
      <span class="sum-days${dl.past?" past":""}">${dl.text}</span></div>`;
  }
  if(nextEntrega){
    const et=nextEntrega.tags.find(t=>t.k==="entrega");
    const dl=daysLabel(nextEntrega.jsDate);
    html+=`<div class="sum-box prox-entrega">
      <div class="sum-label">Próxima entrega</div>
      <div class="sum-main">${et.label}</div>
      <div class="sum-sub">Sem. ${nextEntrega.week} · ${nextEntrega.date}</div>
      <span class="sum-days${dl.past?" past":""}">${dl.text}</span></div>`;
  }
  hitos.forEach((r,i)=>{
    const dl=daysLabel(r.jsDate);
    html+=`<div class="sum-box hito${i+1}">
      <div class="sum-label">Hito ${i+1}</div>
      <div class="sum-main">${r.date} · ${r.hora}</div>
      <div class="sum-sub">${r.clase}</div>
      <span class="sum-days${dl.past?" past":""}">${dl.text}</span></div>`;
  });
  document.getElementById("summary-bar").innerHTML=html;
}

// ICS with 3 reminders (1 week, 1 day, 1 hour before)
function makeICS(r) {
  const lines = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CD1100//S16//ES",
    "BEGIN:VEVENT",
    "DTSTART;TZID=America/Santiago:"+r.hitoDateStr+"T"+r.startT,
    "DTEND;TZID=America/Santiago:"+r.hitoDateStr+"T"+r.endT,
    "SUMMARY:"+r.hitoTitle,
    "DESCRIPTION:Evaluacion en clases - CD1100 Seccion 16",
    "LOCATION:FCFM - Universidad de Chile",
    // Reminder 1 week before
    "BEGIN:VALARM","TRIGGER:-P7D","ACTION:DISPLAY","DESCRIPTION:En 1 semana: "+r.hitoTitle,"END:VALARM",
    // Reminder 1 day before
    "BEGIN:VALARM","TRIGGER:-P1D","ACTION:DISPLAY","DESCRIPTION:Mañana: "+r.hitoTitle,"END:VALARM",
    // Reminder 1 hour before
    "BEGIN:VALARM","TRIGGER:-PT1H","ACTION:DISPLAY","DESCRIPTION:En 1 hora: "+r.hitoTitle,"END:VALARM",
    "END:VEVENT","END:VCALENDAR"];
  const blob=new Blob([lines.join("\n")],{type:"text/calendar"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=r.hitoTitle.replace(/[^a-zA-Z0-9]/g,"_")+".ics"; a.click();
}
function gcLink(r) {

    +"&text="+encodeURIComponent(r.hitoTitle)
    +"&details="+encodeURIComponent("Evaluación en clases · CD1100 Sección 16")
    +"&location="+encodeURIComponent("FCFM – Universidad de Chile")
    +"&ctz=America/Santiago";
  window.open(url,"_blank");
}

// TABLE
let currentFilter="all";
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderTable();
}
function tagHTML(tags){
  return (tags||[]).map(t=>{
    const cls=t.k==="enunciado"?"tag-enunciado":t.k==="presenta"?"tag-presenta":"tag-entrega";
    return "<div><span class='tag "+cls+"'>"+t.t+"</span> "+t.label+"</div>";
  }).join("");
}
function renderTable(){
  const tb=document.getElementById("tbody"); tb.innerHTML="";
  rows.forEach(r=>{
    const hasTarea=r.tags&&r.tags.length>0;
    const show=currentFilter==="all"
      ||(currentFilter==="lab"  &&r.type==="lab")
      ||(currentFilter==="cat"  &&r.type==="cat")
      ||(currentFilter==="hito" &&r.type==="hito")
      ||(currentFilter==="tarea"&&(hasTarea||r.type==="hito"));
    if(!show)return;
    const rowCls  =r.type==="hito"?"row-hito":r.type==="receso"?"row-receso":r.type==="lab"?"row-lab":"row-cat";
    const badgeCls=r.type==="hito"?"badge-hito":r.type==="lab"?"badge-lab":r.type==="cat"?"badge-cat":"badge-receso";
    let ev=tagHTML(r.tags);
    if(r.hito){
      const dl=daysLabel(r.jsDate);
      ev+=`<span class="days-badge${dl.past?" past":""}">${dl.text}</span>`;
      ev+=`<div style="margin-top:4px">
        <button class="cal-btn" onclick='makeICS(${JSON.stringify(r).replace(/'/g,"&#39;")})'>📅 .ics (c/recordatorios)</button>
        <button class="cal-btn" onclick='gcLink(${JSON.stringify(r).replace(/'/g,"&#39;")})'>🗓 Google Cal</button>
      </div>`;
    }
    const tr=document.createElement("tr"); tr.className=rowCls;
    tr.innerHTML=`<td class="date-col">${r.date}<span class="hora">${r.hora}</span></td>`
      +`<td style="text-align:center;font-size:11.5px;color:#aaa">${r.week}</td>`
      +`<td><span class="badge ${badgeCls}">${r.clase}</span></td>`
      +`<td class="topic">${r.topic}</td>`
      +`<td style="font-size:12px;line-height:1.8">${ev}</td>`;
    document.getElementById("tbody").appendChild(tr);
  });
}

// CALENDAR
const MONTHS=["Marzo","Abril","Mayo","Junio","Julio"];
const MONTH_NUMS=[2,3,4,5,6];
function renderCalendar(){
  const cv=document.getElementById("cal-view");
  const ENTREGA_DATES={};
  rows.forEach(r=>(r.tags||[]).forEach(t=>{
    if(t.k==="entrega"){
      const m=t.label.match(/dom (\d+) ([a-z]+)/);
      if(m){
        const months={ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6};
        const key=2026+"-"+months[m[2]]+"-"+m[1];
        ENTREGA_DATES[key]=(ENTREGA_DATES[key]||[]); ENTREGA_DATES[key].push(t.label);
      }
    }
  }));
  let html=`<div class="months-grid">`;
  MONTH_NUMS.forEach((m,mi)=>{
    const firstDay=new Date(2026,m,1).getDay();
    const daysInMonth=new Date(2026,m+1,0).getDate();
    const startOffset=(firstDay+6)%7;
    html+=`<div class="month-block"><div class="month-title">${MONTHS[mi]} 2026</div><div class="cal-grid">`;
    ["L","M","X","J","V","S","D"].forEach(d=>{ html+=`<div class="cal-dow">${d}</div>`; });
    for(let i=0;i<startOffset;i++) html+=`<div class="cal-day empty"></div>`;
    for(let day=1;day<=daysInMonth;day++){
      const isToday=today.getFullYear()===2026&&today.getMonth()===m&&today.getDate()===day;
      const dayRows=rows.filter(r=>{const d=r.jsDate;return d.getFullYear()===2026&&d.getMonth()===m&&d.getDate()===day;});
      const entregas=ENTREGA_DATES["2026-"+m+"-"+day]||[];
      html+=`<div class="cal-day${isToday?" today":""}"><div class="cal-day-num">${day}</div>`;
      dayRows.forEach(r=>{
        const cls=r.type==="hito"?"ev-hito":r.type==="lab"?"ev-lab":r.type==="cat"?"ev-cat":"ev-receso";
        html+=`<div class="cal-event ${cls}">${r.clase}</div>`;
      });
      entregas.forEach(()=>{ html+=`<div class="cal-event ev-entrega">📤 Entrega</div>`; });
      html+=`</div>`;
    }
    html+=`</div></div>`;
  });
  html+=`</div><div class="cal-legend">
    <div class="cal-leg"><div class="cal-leg-swatch" style="background:rgba(59,139,212,.3)"></div>Laboratorio</div>
    <div class="cal-leg"><div class="cal-leg-swatch" style="background:rgba(29,158,117,.3)"></div>Cátedra</div>
    <div class="cal-leg"><div class="cal-leg-swatch" style="background:rgba(216,90,48,.35)"></div>Hito</div>
    <div class="cal-leg"><div class="cal-leg-swatch" style="background:#fae8b8"></div>Entrega tarea</div>
    <div class="cal-leg"><div class="cal-leg-swatch" style="background:#eee"></div>Sin clases</div>
  </div>`;
  cv.innerHTML=html;
}

function setView(v,btn){
  document.querySelectorAll(".view-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("table-view").style.display=v==="table"?"block":"none";
  document.getElementById("cal-view").style.display  =v==="cal"?"block":"none";
  document.getElementById("filters").style.display   =v==="table"?"contents":"none";
}

renderSummary();
renderTable();
renderCalendar();
</script>
